<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Air Quality Tracker</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Force the page to take up the full screen */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden; 
        }

        body { display: flex; }

        /* Left Sidebar */
        #comparison-sidebar {
            width: 300px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
        }

        /* Map Area */
        #map-area {
            flex-grow: 1;
            position: relative;
            height: 100vh;
            background-color: #f0f0f0; /* Light gray while map loads */
        }

        #map { 
            width: 100%; 
            height: 100%; 
        }

        /* Right Sidebar */
        #legend-sidebar {
            width: 250px;
            height: 100vh;
            background: #ffffff;
            border-left: 1px solid #ddd;
            padding: 20px;
            box-sizing: border-box;
            font-size: 0.9em;
            z-index: 10;
        }

        /* Search Bar - Fixed Position */
        .search-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            width: 300px;
        }

        .search-box input {
            border: none;
            padding: 8px 15px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .search-box button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* UI Elements */
        .city-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid #ccc;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .badge { padding: 4px 8px; border-radius: 5px; color: white; font-weight: bold; }
        .aqi-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="comparison-sidebar">
        <h2 style="margin-top:0">Compare</h2>
        <div id="comparison-list">
            <p style="color: #888;">No cities added. Search for a city and click "Add to Compare".</p>
        </div>
    </div>

    <div id="map-area">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="if(event.key === 'Enter') searchCity()">
            <button onclick="searchCity()">Search</button>
        </div>
        <div id="map"></div>
    </div>

    <div id="legend-sidebar">
        <h3>AQI Legend</h3>
        <div><span class="aqi-dot" style="background:#00e400"></span> 0-50 Good</div>
        <div><span class="aqi-dot" style="background:#ffff00"></span> 51-100 Moderate</div>
        <div><span class="aqi-dot" style="background:#ff7e00"></span> 101-150 Unhealthy (S)</div>
        <div><span class="aqi-dot" style="background:#ff0000"></span> 151-200 Unhealthy</div>
        <div><span class="aqi-dot" style="background:#8f3f97"></span> 201-300 Very Unhealthy</div>
        <div><span class="aqi-dot" style="background:#7e0023"></span> 301+ Hazardous</div>
        <hr>
        <p><b>PM2.5:</b> Fine dust particles that are harmful when inhaled.</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize the map
        // We wait for the window to load to make sure the "map" div exists and has height
        window.onload = function() {
            const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            let comparisonCities = [];

            // 2. Search Function
            window.searchCity = async function() {
                const query = document.getElementById('cityInput').value;
                if (!query) return;

                try {
                    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
                    const res = await fetch(geoUrl);
                    const data = await res.json();

                    if (data.results && data.results.length > 0) {
                        const city = data.results[0];
                        fetchAirQuality(city.latitude, city.longitude, city.name);
                        map.setView([city.latitude, city.longitude], 10);
                    } else {
                        alert("City not found.");
                    }
                } catch (err) {
                    console.error(err);
                    alert("Error searching city.");
                }
            };

            // 3. Fetch Air Quality
            async function fetchAirQuality(lat, lon, name) {
                const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm2_5,pm10`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const aqi = data.current.us_aqi;
                    const color = getAQIColor(aqi);

                    const content = `
                        <b>${name}</b><br>
                        AQI: <span class="badge" style="background:${color}">${aqi}</span><br><br>
                        <button onclick="addToCompare('${name}', ${aqi}, ${data.current.pm2_5}, ${data.current.pm10}, '${color}')">
                            + Add to Compare
                        </button>
                    `;
                    L.marker([lat, lon]).addTo(map).bindPopup(content).openPopup();
                } catch (err) {
                    alert("Error fetching air quality.");
                }
            }

            // 4. Comparison Logic
            window.addToCompare = function(name, aqi, pm25, pm10, color) {
                if (comparisonCities.length >= 5) return alert("Max 5 cities.");
                if (comparisonCities.find(c => c.name === name)) return;

                comparisonCities.push({ name, aqi, pm25, pm10, color });
                updateUI();
            };

            window.removeCity = function(index) {
                comparisonCities.splice(index, 1);
                updateUI();
            };

            function updateUI() {
                const list = document.getElementById('comparison-list');
                if (comparisonCities.length === 0) {
                    list.innerHTML = '<p style="color: #888;">No cities added.</p>';
                    return;
                }
                list.innerHTML = comparisonCities.map((c, i) => `
                    <div class="city-card" style="border-left-color: ${c.color}">
                        <button class="remove-btn" onclick="removeCity(${i})">×</button>
                        <strong>${c.name}</strong><br>
                        AQI: <b>${c.aqi}</b><br>
                        <small>PM2.5: ${c.pm25} | PM10: ${c.pm10}</small>
                    </div>
                `).join('');
            }

            function getAQIColor(aqi) {
                if (aqi <= 50) return "#00e400";
                if (aqi <= 100) return "#d4d400"; // Slightly darker yellow for visibility
                if (aqi <= 150) return "#ff7e00";
                if (aqi <= 200) return "#ff0000";
                if (aqi <= 300) return "#8f3f97";
                return "#7e0023";
            }

            // Map click support
            map.on('click', (e) => fetchAirQuality(e.latlng.lat, e.latlng.lng, "Selected Point"));
        };
    </script>
</body>
</html>
